<!DOCTYPE html>
<html lang="en" data-palette="clay" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company</title>
<meta name="description" content="Don't run your business blind. Visibility from the data you already have, in the tools you already use.">

<meta property="og:type" content="website">
<meta property="og:title" content="Company">
<meta property="og:description" content="Don't run your business blind. Visibility from the data you already have, in the tools you already use.">
<meta property="og:url" content="/">
<meta property="og:image" content="/favicon.svg">

<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Company">
<meta name="twitter:description" content="Don't run your business blind. Visibility from the data you already have, in the tools you already use.">

<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/site.webmanifest">
<script src="/scripts/theme.js"></script>
</head>
<body>
  <button class="theme-toggle" type="button" aria-label="Toggle color theme">
      <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path>
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    </button>

  <header class="site-header">
    <div class="site-header__inner">
      <a class="site-logo" href="/">Company</a>
      <nav class="site-nav" aria-label="Main">
        <a class="site-nav__link" href="#flow-playground">How it works</a>
        <a class="site-nav__link" href="mailto:hello@company.com">Contact</a>
      </nav>
      <a class="btn btn--primary site-header__cta" href="mailto:hello@company.com">Get in touch</a>
    </div>
  </header>

  <main>
    <section class="intro">
      <div class="intro__inner">
        <div class="intro__copy">
          <h1 class="intro__title">
            Don't run your business <span class="intro__accent">blind</span>.
          </h1>
          <p class="intro__subtitle">We'll give you the visibility you need — from the data you already have, in the tools you already use.</p>
          <div class="intro__actions">
            <a class="btn btn--primary" href="mailto:hello@company.com">Start a conversation</a>
            <a class="btn btn--ghost" href="#flow-playground">See how it works</a>
          </div>
        </div>
      </div>
    </section>

    <section class="flow-playground" id="flow-playground" aria-label="Data sources flowing into the data assistant">
      <div class="flow-playground__inner">
        <div id="data-flow-root" class="data-flow-root"></div>
      </div>
    </section>
  </main>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
